<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>{{ 'login.title' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ 'login.subtitle' | translate }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p class="login-description">{{ 'login.description' | translate }}</p>

      @if (error()) {
        <p class="login-error">{{ error() }}</p>
      }
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button (click)="signInWithGoogle()" [disabled]="loading()">
        @if (loading()) {
          <mat-spinner diameter="20" />
        }
        @if (!loading()) {
          <mat-icon>login</mat-icon>
        }
        @if (!loading()) {
          {{ 'login.continueWithGoogle' | translate }}
        }
      </button>
    </mat-card-actions>
  </mat-card>
</div>
