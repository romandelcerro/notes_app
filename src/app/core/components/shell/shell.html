<mat-sidenav-container class="sidenav-container">
  <mat-sidenav class="sidenav" [opened]="sidenavOpen()" mode="side">
    <app-sidenav (closeClick)="toggleSidenav()" />
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="content-layout">
      <app-toolbar (menuClick)="toggleSidenav()" [sidenavOpen]="sidenavOpen()" />
      <div class="content-scroll">
        <router-outlet />
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
