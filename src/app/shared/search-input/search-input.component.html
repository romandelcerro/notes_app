<div class="search-wrapper">
  <mat-icon class="search-icon">search</mat-icon>
  <input
    class="search-input"
    type="text"
    [placeholder]="'toolbar.search' | translate"
    [value]="searchQuery()"
    (input)="onInput($any($event.target).value)"
    [attr.aria-label]="'toolbar.searchAriaLabel' | translate" />
</div>
