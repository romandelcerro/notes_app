<mat-toolbar>
  <div class="toolbar-left">
    @if (!sidenavOpen()) {
      <button mat-icon-button (click)="onMenuClick()" [attr.aria-label]="'toolbar.menuAriaLabel' | translate" [matTooltip]="'toolbar.menuAriaLabel' | translate">
        <mat-icon>menu</mat-icon>
      </button>
    }
    <app-search-input (queryChange)="onSearchInput($event)" />
  </div>

  <app-clock />

  <div class="toolbar-right">
    <app-user-avatar (avatarClick)="onProfileClick()" />
  </div>
</mat-toolbar>
