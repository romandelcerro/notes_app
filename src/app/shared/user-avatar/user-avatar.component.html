<button class="avatar-btn" (click)="avatarClick.emit()" [attr.aria-label]="user()?.displayName ?? ('toolbar.profileAriaLabel' | translate)">
  @if (user()?.photoURL) {
    <img class="avatar" [src]="user()!.photoURL!" [alt]="user()!.displayName ?? 'Avatar'" />
  } @else {
    <span class="avatar-initial">{{ avatarInitial() }}</span>
  }
</button>
