<div class="sidenav-header">
  <app-settings />
  <button mat-icon-button (click)="closeClick.emit()" [attr.aria-label]="'sidenav.closeMenuAriaLabel' | translate" [matTooltip]="'sidenav.closeMenuAriaLabel' | translate">
    <mat-icon>keyboard_double_arrow_left</mat-icon>
  </button>
</div>

<nav class="sidenav-nav" [attr.aria-label]="'sidenav.sections' | translate">
  <app-section-item icon="notes" [label]="'sidenav.allNotes' | translate" [active]="selectedSectionId() === null" (selectClick)="selectSection(null)" />

  @for (sec of sections(); track sec.id) {
    <app-section-item
      icon="folder_open"
      [label]="sec.name"
      [section]="sec"
      [active]="selectedSectionId() === sec.id"
      (selectClick)="selectSection(sec.id!)"
      (editClick)="editSection($event)"
      (deleteClick)="deleteSection($event)" />
  }

  <app-section-item icon="add" [label]="'sidenav.newSection' | translate" [primary]="true" (selectClick)="openNewSection()" />
</nav>

<div class="sidenav-footer">
  <button class="sidenav-signout" mat-button (click)="signOut()">
    <mat-icon>logout</mat-icon>
    <span>{{ 'sidenav.signOut' | translate }}</span>
  </button>
</div>
